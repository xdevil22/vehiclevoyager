    <!-- Cookie Suppression Scripts -->
    <script>
      const initCookieSuppression = () => {
        const observer = new MutationObserver(() => {
          document.querySelectorAll("div, p, span").forEach((el) => {
            if (el.innerText?.includes("Cookies are disabled")) {
              el.style.display = "none";
            }
          });
        });

        const blockList = ["Cookies are disabled", "Please enable cookies"];
        const originalAlert = window.alert;
        window.alert = function (msg) {
          if (
            typeof msg === "string" &&
            blockList.some((t) => msg.includes(t))
          ) {
            console.log("Suppressed popup:", msg);
            return;
          }
          return originalAlert(msg);
        };

        const observer2 = new MutationObserver(() => {
          document.querySelectorAll("div, p, span").forEach((el) => {
            if (
              el.innerText &&
              blockList.some((t) => el.innerText.includes(t))
            ) {
              el.remove();
            }
          });
        });

        if (document.body) {
          observer.observe(document.body, {childList: true, subtree: true});
          observer2.observe(document.body, {childList: true, subtree: true});
        }
      };

      if (document.readyState === "loading") {
        window.addEventListener("DOMContentLoaded", initCookieSuppression);
      } else {
        initCookieSuppression();
      }
    </script>

  <body>
    <div id="root"></div>

    <!-- GA4 Event Tracking Script -->
    <script>
      window.addEventListener("load", () => {
        const registerEvents = () => {
          document
            .querySelectorAll(
              'a[href*="affiliate"]:not([data-affiliate-tracked])',
            )
            .forEach((link) => {
              link.setAttribute("data-affiliate-tracked", "true");
              link.addEventListener("click", () => {
                if (typeof window.gtag === "function") {
                  gtag("event", "affiliate_click", {link: link.href});
                }
              });
            });

          const signupBtn = document.getElementById("email-signup-btn");
          if (signupBtn && !signupBtn.hasAttribute("data-signup-tracked")) {
            signupBtn.setAttribute("data-signup-tracked", "true");
            signupBtn.addEventListener("click", () => {
              if (typeof window.gtag === "function") {
                gtag("event", "email_signup");
              }
            });
          }
        };

        if ("requestIdleCallback" in window) {
          requestIdleCallback(registerEvents);
        } else {
          setTimeout(registerEvents, 250);
        }
      });
    </script>
